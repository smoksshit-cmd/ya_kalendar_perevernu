<div id="rp-calendar-widget" class="rp-calendar-widget" style="display: none;">
    <div class="rp-calendar-header">
        <div id="rp-calendar-time" class="rp-calendar-time">00:00</div>
        <div id="rp-calendar-full-date" class="rp-calendar-full-date">1 января 2025</div>
        <div id="rp-calendar-weekday" class="rp-calendar-weekday">Понедельник</div>
    </div>
    
    <div class="rp-calendar-info">
        <div class="rp-calendar-info-item">
            <span class="rp-calendar-info-label">Сезон:</span>
            <span id="rp-calendar-season" class="rp-calendar-info-value">❄️ Зима</span>
        </div>
        <div class="rp-calendar-info-item">
            <span class="rp-calendar-info-label">Погода:</span>
            <span id="rp-calendar-weather" class="rp-calendar-info-value">☁️ Облачно</span>
            <button id="rp-calendar-change-weather" class="rp-calendar-weather-btn" title="Изменить погоду">
                <i class="fa-solid fa-rotate"></i>
            </button>
        </div>
    </div>
    
    <div id="rp-calendar-grid" class="rp-calendar-grid-container">
        <!-- Календарная сетка будет заполнена через JS -->
    </div>
    
    <div class="rp-calendar-footer">
        <small>Время обновляется автоматически по ходу RP</small>
    </div>
</div>
